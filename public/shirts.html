<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Shirts — ThreadLine</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="page">
        <header class="site-header">
            <h1>ThreadLine</h1>
            <p class="site-tagline">Pick your favorites</p>
        </header>

        <nav class="site-nav" aria-label="Main">
            <a href="shirts.html">Products</a>
            <a href="cart.html">Cart</a>
            <a href="/users/logout">Logout</a>
        </nav>

        <p id="cart-message"></p>

        <div id="products">Loading products...</div>
    </div>

    <script>
        fetch("/users/check")
        .then(function(res) {
            return res.json();
        })
        .then(function(data) {
            if (!data.loggedIn) {
                window.location.href = "login.html";
                return;
            }

            loadProducts();
        });

        function loadProducts() {
            fetch("/products")
            .then(function(res) {
                return res.json();
            })
            .then(function(data) {
                var productsDiv = document.getElementById("products");
                productsDiv.innerHTML = "";

                for (var i = 0; i < data.products.length; i++) {
                    var p = data.products[i];

                    productsDiv.innerHTML = productsDiv.innerHTML +
                        "<div class='product-card'>" +
                        "<img class='product-img' src='images/" + getImage(p.name) + "'>" +
                        "<h3>" + p.name + "</h3>" +
                        "<p>" + p.description + "</p>" +
                        "<p>$" + Number(p.price).toFixed(2) + "</p>" +
                        "<button onclick='addToCart(\"" + p._id + "\")'>Add to Cart</button>" +
                        "</div>";
                }
            });
        }

        function getImage(name) {
            if (name === "Classic Black T-Shirt") {
                return "black_shirt.jpg";
            }

            if (name === "White Oversized Tee") {
                return "white_shirt.jpg";
            }

            if (name === "Navy Athletic Shirt") {
                return "navy_shirt.jpg";
            }

            if (name === "Graphic Logo Tee") {
                return "graphic_tee.jpg";
            }

            return "black_shirt.jpg";
        }

        function addToCart(id) {
            fetch("/orders/add", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ productId: id })
            })
            .then(function(res) {
                return res.json();
            })
            .then(function(data) {
                document.getElementById("cart-message").innerText = data.message;
            });
        }
    </script>
</body>
</html>

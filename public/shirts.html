<!DOCTYPE html>
<html>
<head>
    <title>Shirts</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <h1>ThreadLine Shirts</h1>

    <p>
        <a href="shirts.html">Products</a> |
        <a href="cart.html">Cart</a> |
        <a href="/users/logout">Logout</a>
    </p>

    <div id="products">Loading products...</div>

    <script>
        fetch("/users/check")
        .then(function(res) {
            return res.json();
        })
        .then(function(data) {
            if (!data.loggedIn) {
                window.location.href = "login.html";
                return;
            }

            loadProducts();
        });

        var productById = {};

        function productIdStr(id) {
            if (!id && id !== 0) return "";
            if (typeof id === "string") return id;
            if (id && id.$oid) return id.$oid;
            return String(id);
        }

        function getCart() {
            try {
                var raw = localStorage.getItem("threadline_cart");
                return raw ? JSON.parse(raw) : [];
            } catch (e) {
                return [];
            }
        }

        function saveCart(cart) {
            localStorage.setItem("threadline_cart", JSON.stringify(cart));
        }

        function loadProducts() {
            fetch("/products")
            .then(function(res) {
                return res.json();
            })
            .then(function(data) {
                var productsDiv = document.getElementById("products");
                productsDiv.innerHTML = "";

                productById = {};

                for (var i = 0; i < data.products.length; i++) {
                    var p = data.products[i];
                    var sid = productIdStr(p._id);
                    productById[sid] = {
                        id: sid,
                        name: p.name,
                        price: Number(p.price)
                    };

                    productsDiv.innerHTML = productsDiv.innerHTML +
                        "<div class='product-card'>" +
                        "<h3>" + p.name + "</h3>" +
                        "<p>" + p.category + "</p>" +
                        "<p>" + p.description + "</p>" +
                        "<p>$" + Number(p.price).toFixed(2) + "</p>" +
                        "<button onclick='addToCart(\"" + sid + "\")'>Add to Cart</button>" +
                        "</div>";
                }
            });
        }

        function addToCart(id) {
            var p = productById[id];
            if (!p) return;

            var cart = getCart();
            var found = null;
            for (var i = 0; i < cart.length; i++) {
                if (cart[i].id === id) {
                    found = cart[i];
                    break;
                }
            }
            if (found) {
                found.qty = found.qty + 1;
            } else {
                cart.push({
                    id: p.id,
                    name: p.name,
                    price: p.price,
                    qty: 1
                });
            }
            saveCart(cart);
            alert("Added to cart.");
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login — ThreadLine</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="page--auth">
    <header class="site-header">
        <h1>ThreadLine</h1>
        <p class="site-tagline">Sign in to shop shirts</p>
    </header>

    <div class="form-box">
        <h2 id="form-title">Login</h2>

        <input type="text" id="username" placeholder="Username" autocomplete="username">
        <input type="password" id="password" placeholder="Password" autocomplete="current-password">

        <button type="button" id="main-button" onclick="login()">Login</button>
        <button type="button" id="switch-button" onclick="showRegister()">Create New User</button>

        <p id="message"></p>
    </div>

    <script>
        function showRegister() {
            document.getElementById("form-title").innerText = "Create Account";
            document.getElementById("main-button").innerText = "Register";
            document.getElementById("main-button").onclick = function() {
                register();
            };
            document.getElementById("switch-button").innerText = "Back to Login";
            document.getElementById("switch-button").onclick = function() {
                showLogin();
            };
            document.getElementById("message").innerText = "";
        }

        function showLogin() {
            document.getElementById("form-title").innerText = "Login";
            document.getElementById("main-button").innerText = "Login";
            document.getElementById("main-button").onclick = function() {
                login();
            };
            document.getElementById("switch-button").innerText = "Create New User";
            document.getElementById("switch-button").onclick = function() {
                showRegister();
            };
            document.getElementById("message").innerText = "";
        }

        function register() {
            var username = document.getElementById("username").value;
            var password = document.getElementById("password").value;

            fetch("/users/register", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username: username, password: password })
            })
            .then(function(response) {
                return response.json();
            })
            .then(function(data) {
                document.getElementById("message").innerText = data.message;

                if (data.success) {
                    showLogin();
                }
            });
        }

        function login() {
            var username = document.getElementById("username").value;
            var password = document.getElementById("password").value;

            fetch("/users/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username: username, password: password })
            })
            .then(function(response) {
                return response.json();
            })
            .then(function(data) {
                document.getElementById("message").innerText = data.message;

                if (data.success) {
                    window.location.href = "shirts.html";
                }
            });
        }
    </script>
</body>
</html>

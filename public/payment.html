<!DOCTYPE html>
<html>
<head>
    <title>Checkout</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <h1>Checkout</h1>

    <p>
        <a href="shirts.html">Products</a> |
        <a href="cart.html">Cart</a> |
        <a href="/users/logout">Logout</a>
    </p>

    <p id="payment-message"></p>

    <div class="form-box">
        <h2>Payment Info</h2>
        <p>This is a demo checkout. Fake payment info is already filled in.</p>

        <input type="text" id="name" value="Test User">
        <input type="text" id="card" value="4242 4242 4242 4242">
        <input type="text" id="exp" value="12/26">
        <input type="text" id="cvv" value="123">

        <h3 id="total">Total: $0.00</h3>

        <button onclick="placeOrder()">Place Order</button>
        <button onclick="goBack()">Back to Cart</button>
    </div>

    <script>
        fetch("/users/check")
        .then(function(res) {
            return res.json();
        })
        .then(function(data) {
            if (!data.loggedIn) {
                window.location.href = "login.html";
                return;
            }

            loadTotal();
        });

        function loadTotal() {
            fetch("/orders/cart")
            .then(function(res) {
                return res.json();
            })
            .then(function(data) {
                if (!data.success || data.cart.length === 0) {
                    document.getElementById("payment-message").innerText = "Your cart is empty.";
                    return;
                }

                var total = 0;

                for (var i = 0; i < data.cart.length; i++) {
                    total = total + Number(data.cart[i].price);
                }

                document.getElementById("total").innerText = "Total: $" + total.toFixed(2);
            });
        }

        function placeOrder() {
            document.getElementById("payment-message").innerText = "Processing payment...";

            setTimeout(function() {
                fetch("/orders/place", {
                    method: "POST"
                })
                .then(function(res) {
                    return res.json();
                })
                .then(function(data) {
                    if (data.success) {
                        document.getElementById("payment-message").innerText = "";

                        document.querySelector(".form-box").innerHTML =
                            "<h2>Order Confirmed</h2>" +
                            "<p>Your order has been placed successfully.</p>" +
                            "<button onclick='continueShopping()'>Continue Shopping</button>";
                    } else {
                        document.getElementById("payment-message").innerText = data.message;
                    }
                });
            }, 800);
        }

        function continueShopping() {
            window.location.href = "shirts.html";
        }

        function goBack() {
            window.location.href = "cart.html";
        }
    </script>
</body>
</html>
